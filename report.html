<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly Report — BurnoutOS</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .report-page {
      max-width: 1000px;
      margin: 0 auto;
      padding: 36px 40px;
      position: relative;
      z-index: 1;
    }

    .report-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .report-header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 6px;
    }

    .report-header p {
      font-size: 14px;
      color: var(--text-muted);
    }

    .week-nav {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .week-nav button {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      padding: 0;
    }

    .week-nav button:hover {
      background: var(--surface-3);
      border-color: var(--border-light);
      transform: none;
      box-shadow: none;
    }

    .week-nav .week-label {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      min-width: 180px;
      text-align: center;
    }

    /* Report summary grid */
    .report-summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .report-stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      animation: fadeUp 0.4s ease both;
    }

    .report-stat:nth-child(1) { animation-delay:0.05s; }
    .report-stat:nth-child(2) { animation-delay:0.1s; }
    .report-stat:nth-child(3) { animation-delay:0.15s; }
    .report-stat:nth-child(4) { animation-delay:0.2s; }

    .rs-icon { font-size: 20px; margin-bottom: 4px; }
    .rs-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); }
    .rs-value { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; color: var(--text); line-height: 1; }
    .rs-sub { font-size: 12px; color: var(--text-dim); }

    /* Report body grid */
    .report-body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    .report-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.5s ease both;
    }

    .report-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-light), transparent);
    }

    .report-card.full-width {
      grid-column: 1 / -1;
    }

    .rc-title {
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .rc-title .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }

    /* Day pills */
    .day-pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .day-pill {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 10px 12px;
      border-radius: 12px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      min-width: 64px;
      transition: all 0.2s;
      cursor: default;
    }

    .day-pill:hover { border-color: var(--border-light); transform: translateY(-2px); }
    .day-pill.no-data { opacity: 0.35; }

    .dp-name {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }

    .dp-score {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
    }

    .dp-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }

    /* Risk breakdown bars */
    .risk-breakdown {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .rb-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .rb-label {
      font-size: 13px;
      font-weight: 500;
      min-width: 72px;
      color: var(--text-muted);
    }

    .rb-bar-wrap {
      flex: 1;
      height: 8px;
      background: var(--surface-3);
      border-radius: 4px;
      overflow: hidden;
    }

    .rb-bar {
      height: 100%;
      border-radius: 4px;
      transition: width 1s cubic-bezier(0.4,0,0.2,1);
    }

    .rb-count {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      min-width: 24px;
      text-align: right;
    }

    /* Insight cards */
    .insights {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .insight-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 12px 14px;
      border-radius: 12px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      font-size: 13px;
      line-height: 1.5;
      color: var(--text-muted);
      animation: fadeUp 0.4s ease both;
    }

    .insight-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }

    .insight-item strong { color: var(--text); }

    /* Session breakdown */
    .session-bars {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .sb-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .sb-label {
      font-size: 12px;
      min-width: 70px;
      color: var(--text-muted);
      letter-spacing: 0.03em;
    }

    .sb-bar-wrap {
      flex: 1;
      height: 24px;
      background: var(--surface-3);
      border-radius: 6px;
      overflow: hidden;
    }

    .sb-bar {
      height: 100%;
      border-radius: 6px;
      display: flex;
      align-items: center;
      padding-left: 10px;
      font-size: 11px;
      font-weight: 600;
      font-family: 'Syne', sans-serif;
      color: rgba(255,255,255,0.8);
      transition: width 1s cubic-bezier(0.4,0,0.2,1);
      min-width: 0;
    }

    .sb-count {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 13px;
      min-width: 28px;
      text-align: right;
      color: var(--text-muted);
    }

    /* Overall verdict */
    .verdict-box {
      border-radius: 14px;
      padding: 20px 22px;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 4px;
    }

    .verdict-box.low    { background: var(--low-bg); border: 1px solid rgba(34,217,138,0.2); }
    .verdict-box.moderate { background: var(--mid-bg); border: 1px solid rgba(245,166,35,0.2); }
    .verdict-box.high   { background: var(--high-bg); border: 1px solid rgba(247,90,90,0.2); }

    .verdict-emoji { font-size: 32px; }
    .verdict-text { flex: 1; }
    .verdict-text strong { font-family: 'Syne', sans-serif; font-size: 16px; display: block; margin-bottom: 4px; }
    .verdict-text p { font-size: 13px; color: var(--text-muted); line-height: 1.5; }

    /* No data */
    .no-data-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .no-data-state .icon { font-size: 40px; margin-bottom: 12px; }
    .no-data-state p { font-size: 14px; }
    .no-data-state a { color: var(--accent); text-decoration: none; }

    @media (max-width: 768px) {
      .report-page { padding: 20px; }
      .report-summary { grid-template-columns: repeat(2,1fr); }
      .report-body { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <div class="nav-icon">🧠</div>
    <h2>Burnout Prediction</h2>
  </div>
  <div class="nav-links">
    <a href="index.html">Dashboard</a>
    <a href="history.html">History</a>
    <a href="heatmap.html">Heatmap</a>
    <a href="report.html" class="active">Report</a>
  </div>
</nav>

<div class="report-page">

  <div class="report-header">
    <div>
      <h1>Weekly Report</h1>
      <p>A full breakdown of your burnout patterns this week</p>
    </div>
    <div class="week-nav">
      <button id="prevWeek">‹</button>
      <span class="week-label" id="weekLabel">—</span>
      <button id="nextWeek">›</button>
    </div>
  </div>

  <div id="reportContent"></div>

</div>

<script>
  const raw = localStorage.getItem("burnoutData");
  let allData = [];
  try {
    const key = CryptoJS.SHA256(navigator.userAgent + screen.width + screen.height + Intl.DateTimeFormat().resolvedOptions().timeZone).toString().substring(0, 32);
    const bytes = CryptoJS.AES.decrypt(raw, key);
    allData = JSON.parse(bytes.toString(CryptoJS.enc.Utf8)) || [];
  } catch(e) { allData = []; }
  let weekOffset = 0;

  function getWeekRange(offset) {
    const now = new Date();
    const day = now.getDay();
    const monday = new Date(now);
    monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1) + (offset * 7));
    monday.setHours(0,0,0,0);
    const sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);
    sunday.setHours(23,59,59,999);
    return { monday, sunday };
  }

  function getWeekDays(monday) {
    const days = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(monday);
      d.setDate(monday.getDate() + i);
      days.push(d);
    }
    return days;
  }

  const DAY_NAMES = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  function renderReport() {
    const { monday, sunday } = getWeekRange(weekOffset);
    const days = getWeekDays(monday);

    const fmt = d => d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
    document.getElementById('weekLabel').innerText = `${fmt(monday)} – ${fmt(sunday)}`;

    // Filter data for this week
    const weekData = allData.filter(e => {
      const d = new Date(e.datetime);
      return d >= monday && d <= sunday;
    });

    const container = document.getElementById('reportContent');

    if (weekData.length === 0) {
      container.innerHTML = `
        <div class="no-data-state">
          <div class="icon">📋</div>
          <p>No data logged for this week. <a href="index.html">Go to Dashboard</a> to start tracking.</p>
        </div>`;
      return;
    }

    // Per day stats
    const dayStats = {};
    days.forEach((d, i) => {
      const ds = d.toISOString().split('T')[0];
      const entries = weekData.filter(e => e.datetime.startsWith(ds));
      dayStats[DAY_NAMES[i]] = entries.length > 0
        ? { avg: Math.round(entries.reduce((s,e)=>s+e.score,0)/entries.length),
            risk: entries.some(e=>e.risk==='High')?'High':entries.some(e=>e.risk==='Moderate')?'Moderate':'Low',
            count: entries.length }
        : null;
    });

    const avgScore   = Math.round(weekData.reduce((s,e)=>s+e.score,0)/weekData.length);
    const maxScore   = Math.max(...weekData.map(e=>e.score));
    const minScore   = Math.min(...weekData.map(e=>e.score));
    const lowCount   = weekData.filter(e=>e.risk==='Low').length;
    const modCount   = weekData.filter(e=>e.risk==='Moderate').length;
    const highCount  = weekData.filter(e=>e.risk==='High').length;

    const overallRisk = avgScore > 70 ? 'High' : avgScore > 35 ? 'Moderate' : 'Low';

    // Session breakdown
    const sessions = { Morning:0, Afternoon:0, Evening:0, Night:0 };
    weekData.forEach(e => { if (sessions[e.session] !== undefined) sessions[e.session]++; });
    const maxSession = Math.max(...Object.values(sessions));

    const sessionColors = {
      Morning:'linear-gradient(90deg,#f59e0b,#fbbf24)',
      Afternoon:'linear-gradient(90deg,#4f8ef7,#60a5fa)',
      Evening:'linear-gradient(90deg,#7c6af7,#a78bfa)',
      Night:'linear-gradient(90deg,#1e293b,#334155)'
    };

    // Best / worst day
    const daysWithData = Object.entries(dayStats).filter(([,v])=>v);
    const bestDay  = daysWithData.length ? daysWithData.reduce((a,b) => a[1].avg < b[1].avg ? a : b) : null;
    const worstDay = daysWithData.length ? daysWithData.reduce((a,b) => a[1].avg > b[1].avg ? a : b) : null;

    // Insights
    const insights = [];
    if (highCount > 0) insights.push({ icon:'🔥', text: `You hit <strong>High Risk</strong> on ${highCount} session${highCount>1?'s':''} this week. Prioritize sleep and breaks.` });
    if (lowCount === weekData.length) insights.push({ icon:'🌟', text: `<strong>Excellent week!</strong> All sessions stayed in the Low Risk zone. Keep up the routine.` });
    if (bestDay)  insights.push({ icon:'✅', text: `<strong>${bestDay[0]}</strong> was your best day with an average score of ${bestDay[1].avg}.` });
    if (worstDay && worstDay[0] !== bestDay?.[0]) insights.push({ icon:'⚠️', text: `<strong>${worstDay[0]}</strong> was your most stressful day — avg score ${worstDay[1].avg}.` });
    const topSession = Object.entries(sessions).sort((a,b)=>b[1]-a[1])[0];
    if (topSession[1] > 0) insights.push({ icon:'🕐', text: `You log most often in the <strong>${topSession[0]}</strong> session (${topSession[1]} times this week).` });
    if (avgScore > 60) insights.push({ icon:'💤', text: `High average score this week. Consider increasing sleep hours and reducing screen time.` });

    const riskColors = { Low:'var(--low)', Moderate:'var(--mid)', High:'var(--high)' };

    const verdicts = {
      Low:      { emoji:'😊', title:'You had a great week!',       text:'Your burnout risk stayed low throughout the week. Your habits are well-balanced — keep maintaining this healthy rhythm.' },
      Moderate: { emoji:'😐', title:'A mixed week',                 text:'Some strain was detected this week. Watch your sleep and study patterns — a few small adjustments could make a big difference.' },
      High:     { emoji:'😟', title:'A tough week — rest up!',      text:'Your burnout risk was elevated this week. Consider reducing workload, improving sleep, and scheduling recovery time before next week.' }
    };
    const v = verdicts[overallRisk];

    container.innerHTML = `
      <!-- Summary Stats -->
      <div class="report-summary">
        <div class="report-stat">
          <span class="rs-icon">📊</span>
          <span class="rs-label">Avg Score</span>
          <span class="rs-value">${avgScore}</span>
          <span class="rs-sub">out of 120</span>
        </div>
        <div class="report-stat">
          <span class="rs-icon">📝</span>
          <span class="rs-label">Sessions</span>
          <span class="rs-value">${weekData.length}</span>
          <span class="rs-sub">logged this week</span>
        </div>
        <div class="report-stat">
          <span class="rs-icon">⬆️</span>
          <span class="rs-label">Peak Score</span>
          <span class="rs-value" style="color:var(--high)">${maxScore}</span>
          <span class="rs-sub">highest recorded</span>
        </div>
        <div class="report-stat">
          <span class="rs-icon">⬇️</span>
          <span class="rs-label">Best Score</span>
          <span class="rs-value" style="color:var(--low)">${minScore}</span>
          <span class="rs-sub">lowest recorded</span>
        </div>
      </div>

      <!-- Body -->
      <div class="report-body">

        <!-- Daily Pills -->
        <div class="report-card">
          <div class="rc-title"><span class="dot"></span> Day by Day</div>
          <div class="day-pills">
            ${DAY_NAMES.map(name => {
              const ds = dayStats[name];
              if (!ds) return `<div class="day-pill no-data"><span class="dp-name">${name}</span><span class="dp-score" style="color:var(--text-dim)">—</span><span class="dp-dot" style="background:var(--surface-3)"></span></div>`;
              const color = riskColors[ds.risk];
              return `<div class="day-pill">
                <span class="dp-name">${name}</span>
                <span class="dp-score" style="color:${color}">${ds.avg}</span>
                <span class="dp-dot" style="background:${color};box-shadow:0 0 6px ${color}"></span>
              </div>`;
            }).join('')}
          </div>
          <div style="margin-top:16px;">
            <canvas id="weekChart" height="80"></canvas>
          </div>
        </div>

        <!-- Risk Breakdown -->
        <div class="report-card">
          <div class="rc-title"><span class="dot"></span> Risk Breakdown</div>
          <div class="risk-breakdown">
            <div class="rb-row">
              <span class="rb-label" style="color:var(--low)">Low</span>
              <div class="rb-bar-wrap"><div class="rb-bar" style="width:${weekData.length?Math.round(lowCount/weekData.length*100):0}%;background:var(--low)"></div></div>
              <span class="rb-count" style="color:var(--low)">${lowCount}</span>
            </div>
            <div class="rb-row">
              <span class="rb-label" style="color:var(--mid)">Moderate</span>
              <div class="rb-bar-wrap"><div class="rb-bar" style="width:${weekData.length?Math.round(modCount/weekData.length*100):0}%;background:var(--mid)"></div></div>
              <span class="rb-count" style="color:var(--mid)">${modCount}</span>
            </div>
            <div class="rb-row">
              <span class="rb-label" style="color:var(--high)">High</span>
              <div class="rb-bar-wrap"><div class="rb-bar" style="width:${weekData.length?Math.round(highCount/weekData.length*100):0}%;background:var(--high)"></div></div>
              <span class="rb-count" style="color:var(--high)">${highCount}</span>
            </div>
          </div>

          <div style="margin-top:24px;">
            <div class="rc-title" style="margin-bottom:14px;"><span class="dot"></span> Session Breakdown</div>
            <div class="session-bars">
              ${Object.entries(sessions).map(([name, count]) => `
                <div class="sb-row">
                  <span class="sb-label">${name}</span>
                  <div class="sb-bar-wrap">
                    <div class="sb-bar" style="width:${maxSession?Math.round(count/maxSession*100):0}%;background:${sessionColors[name]}">
                      ${count > 0 ? count : ''}
                    </div>
                  </div>
                  <span class="sb-count">${count}</span>
                </div>`).join('')}
            </div>
          </div>
        </div>

        <!-- Insights -->
        <div class="report-card full-width">
          <div class="rc-title"><span class="dot"></span> Weekly Insights</div>
          <div class="insights">
            ${insights.map((ins, i) => `
              <div class="insight-item" style="animation-delay:${0.05*i}s">
                <span class="insight-icon">${ins.icon}</span>
                <span>${ins.text}</span>
              </div>`).join('')}
          </div>

          <div class="verdict-box ${overallRisk.toLowerCase()}" style="margin-top:20px;">
            <span class="verdict-emoji">${v.emoji}</span>
            <div class="verdict-text">
              <strong>${v.title}</strong>
              <p>${v.text}</p>
            </div>
          </div>
        </div>

      </div>
    `;

    // Week chart
    const chartLabels = DAY_NAMES;
    const chartData = DAY_NAMES.map(n => dayStats[n]?.avg ?? null);
    const chartColors = DAY_NAMES.map(n => {
      const r = dayStats[n]?.risk;
      return r === 'High' ? '#f75a5a' : r === 'Moderate' ? '#f5a623' : r === 'Low' ? '#22d98a' : 'transparent';
    });

    new Chart(document.getElementById('weekChart'), {
      type: 'bar',
      data: {
        labels: chartLabels,
        datasets: [{
          data: chartData,
          backgroundColor: chartColors,
          borderRadius: 6,
          borderSkipped: false
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false }, tooltip: {
          backgroundColor: '#0e1420',
          borderColor: 'rgba(255,255,255,0.07)',
          borderWidth: 1,
          titleColor: '#6b7a99',
          bodyColor: '#e8edf5',
          padding: 10
        }},
        scales: {
          x: { grid: { color:'rgba(255,255,255,0.04)' }, ticks: { color:'#3d4f6e', font:{size:11} } },
          y: { grid: { color:'rgba(255,255,255,0.04)' }, ticks: { color:'#3d4f6e', font:{size:11} }, min:0, max:120 }
        }
      }
    });
  }

  document.getElementById('prevWeek').onclick = () => { weekOffset--; renderReport(); };
  document.getElementById('nextWeek').onclick = () => { if (weekOffset < 0) { weekOffset++; renderReport(); } };

  renderReport();
</script>
</body>
</html>
